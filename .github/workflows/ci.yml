name: CI/CD Pipeline

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Node.js Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Check syntax
        working-directory: ./backend
        run: node --check server.js && echo "Backend OK"

  ai-test:
    name: AI Service — Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install fastapi pydantic uvicorn python-multipart httpx python-dotenv aiofiles
      - name: Check syntax
        working-directory: ./ai_service
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/routes/process.py
          echo "AI Service OK"

  frontend-test:
    name: Frontend — React Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:5000/api
          VITE_SOCKET_URL: http://localhost:5000
        run: npm run build && echo "Frontend OK"
